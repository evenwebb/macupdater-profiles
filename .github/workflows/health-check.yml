name: Daily Profile Health Check

on:
  schedule:
    - cron: "0 6 * * *"  # 6am UTC daily
  workflow_dispatch:

concurrency:
  group: profile-health
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate all profile JSON
        run: python3 scripts/validate_profiles.py

      - name: Check remote profile health (rotating batch)
        id: health
        run: |
          # Rotating batch: checks 40 profiles per day, complete cycle every 5 days.
          # 177 profiles ÷ 5 days ≈ 36/day. We use 40 to include new ones.
          # Runtime: ~40 × 3s ÷ 8 workers ≈ 15 seconds. Free on public repos.
          DAY=$(( ($(date +%j) - 1) % 5 ))   # 0-4 rotating daily
          OFFSET=$(( DAY * 40 ))
          echo "Batch $DAY: offset=$OFFSET limit=40"
          python3 scripts/validate_remote.py --offset "$OFFSET" --sample 40 --report > health-report.md
          cat health-report.md
        continue-on-error: true

      - name: Generate health badge
        run: |
          mkdir -p badges
          python3 scripts/validate_remote.py --sample 30 --badge > badges/health.json

      - name: Commit health badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/health.json
          if git diff --cached --quiet; then
            echo "No badge changes"
            exit 0
          fi
          git commit -m "Update profile health badge [skip ci]"
          git push

      - name: Open issue for broken profiles
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const report = fs.readFileSync("health-report.md", "utf8");
            const brokenCount = (report.match(/BROKEN/g) || []).length;
            if (brokenCount === 0) return;

            const title = `Profile health: ${brokenCount} broken profile(s)`;
            const body = report + "\n\n---\nAuto-generated by daily health check workflow.";

            // Look for existing broken-profile issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: ["health-check"],
              per_page: 5,
            });

            const existing = issues.data.find(i => i.title.startsWith("Profile health:"));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ["health-check"],
              });
            }

      - name: Auto-close health issue if all clear
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: ["health-check"],
              per_page: 5,
            });
            for (const issue of issues.data) {
              if (issue.title.startsWith("Profile health:")) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: "✅ All profiles healthy again. Auto-closing.",
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: "closed",
                });
              }
            }
