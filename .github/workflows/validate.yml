name: Validate Profiles

on:
  push:
    paths:
      - '**.json'
      - 'scripts/**'
      - '.github/workflows/validate.yml'
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate all profile JSON files
        run: python3 scripts/validate_profiles.py
      - name: Verify manifest is current
        run: |
          python3 scripts/generate_manifest.py
          if ! git diff --exit-code manifest.json; then
            echo "manifest.json is out of date. Run scripts/generate_manifest.py"
            exit 1
          fi
